<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>عداد رمضان 2027 | كم متبقي على شهر رمضان المبارك</title>
    <meta name="description" content="تعرف على الوقت المتبقي بالظبط بالأيام والساعات والثواني لقدوم شهر رمضان المبارك لعام 2027. عداد تنازلي دقيق يعمل على مدار الساعة.">
    <meta name="keywords" content="رمضان, عداد رمضان, كم متبقي لرمضان, رمضان 2027, موعد رمضان, ادعية رمضان">
    
    <meta property="og:title" content="عداد رمضان 2027 | المتبقي على الشهر الفضيل">
    <meta property="og:description" content="عداد تنازلي ذكي ومباشر لحساب الوقت المتبقي لرمضان.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #0b0d16; color: #fff; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 600px; text-align: center; margin-top: 20px; }
        h1 { font-size: 22px; margin-bottom: 20px; color: #fff; }
        
        /* العداد التنازلي */
        .countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .box { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 15px 5px; }
        .num { display: block; font-size: 32px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.4); }
        .label { font-size: 12px; color: #a0aec0; margin-top: 5px; }
        
        /* 💰 أماكن الإعلانات */
        .ad-space { background: rgba(255, 255, 255, 0.02); border: 1px dashed rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 20px; margin: 20px 0; font-size: 13px; color: #a0aec0; display: flex; justify-content: center; align-items: center; min-height: 70px; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="ad-space">
            <script>
              atOptions = {
                'key' : '7a6c12bffef5feeda4fa41eeedb6fb6f',
                'format' : 'iframe',
                'height' : 60,
                'width' : 468,
                'params' : {}
              };
            </script>
            <script src="https://www.highperformanceformat.com/7a6c12bffef5feeda4fa41eeedb6fb6f/invoke.js"></script>
        </div>

        <h1>🌙 المتبقي على شهر رمضان المبارك 2027</h1>
        
        <div class="countdown">
            <div class="box"><span class="num" id="days">00</span><span class="label">يوم</span></div>
            <div class="box"><span class="num" id="hours">00</span><span class="label">ساعة</span></div>
            <div class="box"><span class="num" id="minutes">00</span><span class="label">دقيقة</span></div>
            <div class="box"><span class="num" id="seconds">00</span><span class="label">ثانية</span></div>
        </div>

        <div class="ad-space" style="min-height: 260px;">
            <script>
              atOptions = {
                'key' : 'cff735b1814f88521c114515ce9de41c',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
                  };
            </script>
            <script src="https://www.highperformanceformat.com/cff735b1814f88521c114515ce9de41c/invoke.js"></script>
        </div>

    </div>

    <script>
        // العداد التنازلي لرمضان (8 فبراير 2027 فلكياً)
        const targetTime = new Date("Feb 8, 2027 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetTime - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }, 1000);
    </script>
</body>
</html>
